name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - name: Plugin package is present
        shell: bash
        run: |
          test -f plugins/fable-mcp/.codex-plugin/plugin.json
          test -f plugins/fable-mcp/.mcp.json
          test -f plugins/fable-mcp/hooks/hooks.json
          test -f plugins/fable-mcp/hooks/fable-loop-stop.mjs
          test -f plugins/fable-mcp/dist/server.bundled.mjs

      - name: MCP handshake exposes all four tools
        shell: bash
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"fable_status","arguments":{}}}' \
            | node plugins/fable-mcp/dist/server.bundled.mjs > out.json
          grep -q instructions out.json
          grep -q fable_status out.json
          grep -q fable_plan out.json
          grep -q fable_ask out.json
          grep -q fable_review out.json
          grep -q "fable-mcp status" out.json
          grep -q "does not call Fable" out.json
          echo "handshake OK"

      - name: Missing claude CLI returns a friendly error
        shell: bash
        env:
          FABLE_CLAUDE_BIN: /nonexistent/claude
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"fable_ask","arguments":{"question":"test"}}}' \
            | node plugins/fable-mcp/dist/server.bundled.mjs > out2.json
          grep -q "claude CLI" out2.json
          echo "error path OK"
